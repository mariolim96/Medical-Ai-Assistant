version: '3.8'

services:
  # ==========================================
  # INFRASTRUCTURE CORE
  # ==========================================
  
  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8000:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - chat-service
      - rag-service
      - booking-service
      - doctor-service
      - triage-service
    networks:
      - medical-network

  # Kafka (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - medical-network

  # PostgreSQL Main (with pgvector)
  postgres-main:
    image: ankane/pgvector:latest
    container_name: postgres-main
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medical_admin
      POSTGRES_PASSWORD: medical_password
    volumes:
      - postgres-main-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-main.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medical-network

  # PostgreSQL Analytics (with TimescaleDB)
  postgres-analytics:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres-analytics
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: analytics_admin
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics_db
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
    networks:
      - medical-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - medical-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    volumes:
      - mongodb-data:/data/db
    networks:
      - medical-network

  # ==========================================
  # MICROSERVICES (PLACEHOLDERS)
  # ==========================================

  # Auth Service (Spring Boot - Java 21)
  auth-service:
    image: eclipse-temurin:21-jdk
    container_name: auth-service
    command: tail -f /dev/null
    environment:
      - DB_HOST=postgres-main
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=medical_admin
      - DB_PASSWORD=medical_password
    networks:
      - medical-network

  # Doctor Service (Spring Boot - Java 21)
  doctor-service:
    image: eclipse-temurin:21-jdk
    container_name: doctor-service
    command: tail -f /dev/null
    environment:
      - DB_HOST=postgres-main
      - DB_PORT=5432
      - DB_NAME=doctor_db
      - DB_USER=medical_admin
      - DB_PASSWORD=medical_password
    networks:
      - medical-network

  # Chat Service (NestJS - Node 20)
  chat-service:
    image: node:20-alpine
    container_name: chat-service
    command: tail -f /dev/null
    environment:
      - MONGO_URI=mongodb://mongo_admin:mongo_password@mongodb:27017/
      - KAFKA_BROKER=kafka:29092
    networks:
      - medical-network

  # Booking Service (NestJS - Node 20)
  booking-service:
    image: node:20-alpine
    container_name: booking-service
    command: tail -f /dev/null
    environment:
      - DB_HOST=postgres-main
      - DB_PORT=5432
      - DB_NAME=booking_db
      - DB_USER=medical_admin
      - DB_PASSWORD=medical_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKER=kafka:29092
    networks:
      - medical-network

  # Notification Service (NestJS - Node 20)
  notification-service:
    image: node:20-alpine
    container_name: notification-service
    command: tail -f /dev/null
    environment:
      - KAFKA_BROKER=kafka:29092
    networks:
      - medical-network

  # RAG Service (Python - FastAPI)
  rag-service:
    image: python:3.12-slim
    container_name: rag-service
    command: tail -f /dev/null
    environment:
      - DB_HOST=postgres-main
      - DB_PORT=5432
      - DB_NAME=rag_db
      - DB_USER=medical_admin
      - DB_PASSWORD=medical_password
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - medical-network

  # Triage Service (Python - FastAPI)
  triage-service:
    image: python:3.12-slim
    container_name: triage-service
    command: tail -f /dev/null
    environment:
      - KAFKA_BROKER=kafka:29092
    networks:
      - medical-network

  # Analytics Service (Python - FastAPI)
  analytics-service:
    image: python:3.12-slim
    container_name: analytics-service
    command: tail -f /dev/null
    environment:
      - DB_HOST=postgres-analytics
      - DB_PORT=5432
      - DB_NAME=analytics_db
      - DB_USER=analytics_admin
      - DB_PASSWORD=analytics_password
      - KAFKA_BROKER=kafka:29092
    networks:
      - medical-network

volumes:
  postgres-main-data:
  postgres-analytics-data:
  redis-data:
  mongodb-data:

networks:
  medical-network:
    driver: bridge
