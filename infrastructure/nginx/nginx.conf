events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging format for Kafka ingestion
    log_format kafka_json escape=json
      '{'
        '"timestamp":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"request_id":"$request_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"latency_ms":$request_time,'
        '"user_agent":"$http_user_agent"'
      '}';

    access_log /var/log/nginx/access.log kafka_json;
    error_log /var/log/nginx/error.log;

    # Rate Limiting Zone (10MB shared memory, 60 requests per minute)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # Backend upstream definitions
    upstream auth_service {
        server auth-service:8080;
    }

    upstream chat_service {
        server chat-service:3000;
    }

    upstream rag_service {
        server rag-service:8000;
    }

    upstream triage_service {
        server triage-service:8000;
    }

    upstream booking_service {
        server booking-service:3000;
    }

    upstream doctor_service {
        server doctor-service:8080;
    }

    upstream notification_service {
        server notification-service:3000;
    }

    upstream analytics_service {
        server analytics-service:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Apply Rate Limiting globally
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # Internal Auth Validation
        location = /internal/auth/validate {
            internal;
            proxy_pass http://auth_service/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # --- Public Endpoints ---

        location /api/v1/auth/login {
            proxy_pass http://auth_service/api/v1/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/auth/register {
            proxy_pass http://auth_service/api/v1/auth/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Protected Endpoints ---

        location /api/v1/chat {
            auth_request /internal/auth/validate;
            proxy_pass http://chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Websocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/booking {
            auth_request /internal/auth/validate;
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/doctor {
            auth_request /internal/auth/validate;
            proxy_pass http://doctor_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Other Services (Protected) ---

        location /api/v1/rag {
            auth_request /internal/auth/validate;
            proxy_pass http://rag_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/triage {
            auth_request /internal/auth/validate;
            proxy_pass http://triage_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/notification {
            auth_request /internal/auth/validate;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/analytics {
            auth_request /internal/auth/validate;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default fallback
        location / {
            return 404 '{"error": "Service Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
