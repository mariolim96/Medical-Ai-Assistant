events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Backend upstream definitions
    upstream auth_service {
        server auth-service:8080; # Spring Boot default port
    }

    upstream chat_service {
        server chat-service:3000; # NestJS default port
    }

    upstream rag_service {
        server rag-service:8000; # FastAPI default port
    }

    upstream triage_service {
        server triage-service:8000; # FastAPI default port
    }

    upstream booking_service {
        server booking-service:3000; # NestJS default port
    }

    upstream doctor_service {
        server doctor-service:8080; # Spring Boot default port
    }

    upstream notification_service {
        server notification-service:3000; # NestJS default port
    }

    upstream analytics_service {
        server analytics-service:8000; # FastAPI default port
    }

    server {
        listen 80;
        server_name localhost;

        # Auth Service
        location /api/v1/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Chat Service
        location /api/v1/chat {
            proxy_pass http://chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Websocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # RAG Service
        location /api/v1/rag {
            proxy_pass http://rag_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Triage Service
        location /api/v1/triage {
            proxy_pass http://triage_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Booking Service
        location /api/v1/booking {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Doctor Service
        location /api/v1/doctor {
            proxy_pass http://doctor_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Notification Service
        location /api/v1/notification {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Analytics Service
        location /api/v1/analytics {
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default fallback
        location / {
            return 404 '{"error": "Service Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
