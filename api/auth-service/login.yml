info:
  name: login
  type: http

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "mario.esposito@example.com",
        "password": "PasswordSicura123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
